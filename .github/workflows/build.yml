name: build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Rust targets for universal macOS
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm install

      - name: Generate icons (if missing)
        shell: bash
        run: |
          if [ ! -f src-tauri/icons/icon.ico ] || [ ! -f src-tauri/icons/icon.icns ]; then
            if [ ! -f src-tauri/icons/source.png ]; then
              echo "Missing src-tauri/icons/source.png — commit a 1024x1024 PNG there." >&2
              exit 1
            fi
            npx @tauri-apps/cli icon src-tauri/icons/source.png
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MoneyMakers VPN ${{ github.ref_name }}'
          releaseBody: 'Download the asset for your platform.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
