name: build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: universal-apple-darwin
            args: --target universal-apple-darwin
          - platform: windows-latest
            target: ''
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm install

      - name: Generate icons (if missing)
        shell: bash
        run: |
          if [ ! -f src-tauri/icons/icon.ico ] || [ ! -f src-tauri/icons/icon.icns ]; then
            echo "Generating placeholder icons from src-tauri/icons/source.png"
            if [ ! -f src-tauri/icons/source.png ]; then
              # Create a solid-colour 1024x1024 PNG as a last-resort placeholder.
              node -e "
                const fs=require('fs');
                const size=1024;
                // minimal PNG encoder would be overkill; we rely on tauri icon
                // to refuse anyway if missing — so just abort with a clear msg.
                console.error('No src-tauri/icons/source.png found — drop a 1024x1024 PNG there and re-run.');
                process.exit(1);
              "
            fi
            npx @tauri-apps/cli icon src-tauri/icons/source.png
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MoneyMakers VPN ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download for your platform.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
