name: build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  SINGBOX_VERSION: '1.10.3'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Rust targets for universal macOS
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm install

      - name: Generate icons (if missing)
        shell: bash
        run: |
          if [ ! -f src-tauri/icons/icon.ico ] || [ ! -f src-tauri/icons/icon.icns ]; then
            if [ ! -f src-tauri/icons/source.png ]; then
              echo "Missing src-tauri/icons/source.png — commit a 1024x1024 PNG there." >&2
              exit 1
            fi
            npx @tauri-apps/cli icon src-tauri/icons/source.png
          fi

      - name: Download sing-box (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ver = "${{ env.SINGBOX_VERSION }}"
          $url = "https://github.com/SagerNet/sing-box/releases/download/v$ver/sing-box-$ver-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile singbox.zip
          Expand-Archive singbox.zip -DestinationPath singbox_extracted
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          Copy-Item "singbox_extracted/sing-box-$ver-windows-amd64/sing-box.exe" "src-tauri/binaries/sing-box-x86_64-pc-windows-msvc.exe"
          Get-ChildItem src-tauri/binaries

      - name: Download sing-box per-arch (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          # `--target universal-apple-darwin` builds the app for each arch
          # separately and lipos them; it expects per-arch sidecars, not a
          # pre-fused universal binary.
          ver="${{ env.SINGBOX_VERSION }}"
          curl -L -o singbox-amd64.tar.gz "https://github.com/SagerNet/sing-box/releases/download/v${ver}/sing-box-${ver}-darwin-amd64.tar.gz"
          curl -L -o singbox-arm64.tar.gz "https://github.com/SagerNet/sing-box/releases/download/v${ver}/sing-box-${ver}-darwin-arm64.tar.gz"
          tar xzf singbox-amd64.tar.gz
          tar xzf singbox-arm64.tar.gz
          mkdir -p src-tauri/binaries
          cp "sing-box-${ver}-darwin-amd64/sing-box" "src-tauri/binaries/sing-box-x86_64-apple-darwin"
          cp "sing-box-${ver}-darwin-arm64/sing-box" "src-tauri/binaries/sing-box-aarch64-apple-darwin"
          chmod +x src-tauri/binaries/sing-box-*
          ls -la src-tauri/binaries

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MoneyMakers VPN ${{ github.ref_name }}'
          releaseBody: 'Download the asset for your platform.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
