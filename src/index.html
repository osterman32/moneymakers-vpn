<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoneyMakers VPN</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header>
        <h1>MoneyMakers VPN</h1>
      </header>

      <section id="needs-download" class="view hidden">
        <p class="hint">
          This app isn&apos;t tied to an account yet. Head to
          <b>moneymakers.inc</b> in your browser, create an account on the
          <code>~/vpn</code> tab, and download <i>your</i> personal file.
        </p>
        <a id="open-site-btn" href="https://moneymakers.inc/" target="_blank" rel="noopener noreferrer" class="primary big">
          Open moneymakers.inc
        </a>
      </section>

      <section id="main" class="view hidden">
        <p class="greeting">
          signed in as <span id="username" class="accent"></span>
        </p>
        <label>
          <span class="label">server</span>
          <select id="server-select"></select>
        </label>
        <button id="connect-btn" class="primary big">Connect</button>
      </section>

      <div id="status" class="status"></div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
