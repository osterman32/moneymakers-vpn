<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoneyMakers VPN</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header>
        <h1>MoneyMakers VPN</h1>
      </header>

      <section id="paste-key" class="view hidden">
        <p class="hint">
          Paste your sign-in key to finish setup. Get it from
          <b>moneymakers.inc</b> → <code>~/vpn</code> tab (after creating an
          account).
        </p>
        <label>
          <span class="label">sign-in key</span>
          <input
            id="key-input"
            placeholder="paste here"
            autocomplete="off"
            spellcheck="false"
          />
        </label>
        <button id="key-submit" class="primary big">Sign in</button>
        <a
          id="open-site-btn"
          href="https://moneymakers.inc/"
          target="_blank"
          rel="noopener noreferrer"
          class="link-button"
        >
          don&apos;t have a key? open moneymakers.inc
        </a>
      </section>

      <section id="main" class="view hidden">
        <p class="greeting">
          signed in as <span id="username" class="accent"></span>
        </p>
        <div id="update-banner" class="banner hidden"></div>
        <label>
          <span class="label">server</span>
          <select id="server-select"></select>
        </label>
        <button id="connect-btn" class="primary big">Connect</button>
        <p id="connect-hint" class="hint hidden">
          macOS will ask for your password once to enable system-wide routing.
        </p>
        <button id="log-btn" class="link">show log</button>
        <button id="signout-btn" class="link">sign out</button>
        <pre id="log-output" class="log hidden"></pre>
      </section>

      <div id="status" class="status"></div>
    </div>

    <div id="blocker" class="blocker hidden">
      <div class="blocker-card">
        <h2 id="blocker-title"></h2>
        <p id="blocker-message"></p>
        <button id="blocker-action" class="primary big hidden"></button>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
